name: Deploy Luoiflix

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on home server
        shell: bash
        run: |
          set -e
          cd /home/lazy/BTL_LT_WEB
          git pull origin main
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build