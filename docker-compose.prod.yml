services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: luoiflix-backend:${APP_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      MOVIEAPP_JWT_SECRET: ${MOVIEAPP_JWT_SECRET}
      MOVIEAPP_JWT_ACCESS_TOKEN: ${MOVIEAPP_JWT_ACCESS_TOKEN:-8640000}
      MOVIEAPP_JWT_REFRESH_TOKEN: ${MOVIEAPP_JWT_REFRESH_TOKEN:-8640000}
      MOVIEAPP_FRONTEND_URL: ${MOVIEAPP_FRONTEND_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    networks:
      - app
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: /api/v1
        NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-https://media.lazy247.xyz}
    image: luoiflix-frontend:${APP_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_BACKEND_URL: /api/v1
      BACKEND_INTERNAL_URL: http://backend:8080/api/v1
      NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-https://media.lazy247.xyz}
    networks:
      - app
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-300}
      PROXY_SEND_TIMEOUT: ${PROXY_SEND_TIMEOUT:-300}
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/prod.conf.template:/etc/nginx/templates/default.conf.template:ro
    networks:
      - app
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app:
    driver: bridge
